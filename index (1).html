<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اسحاق | Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #1e293b, #0f172a);
    color: white;
    text-align: center;
}

/* الكارد */
.card {
    margin: 80px auto;
    width: 340px;
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
}

/* صورة Discord */
.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid #38bdf8;
    margin-bottom: 15px;
}

h1 {
    color: #38bdf8;
    margin: 10px 0;
}

p {
    color: #cbd5e1;
}

/* أزرار */
.btn {
    display: block;
    margin-top: 12px;
    padding: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.discord {
    background: #5865F2;
}

.instagram {
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
}

.btn:hover {
    transform: scale(1.05);
    opacity: 0.9;
}
</style>
</head>

<body>

<div class="card">

    <!-- صورة ديسكورد -->
    <img class="profile" 
         src="https://cdn.discordapp.com/avatars/1200879352875864134/f8dcf7c4b6cef83644eb44beed2fabf3.webp?size=256">

    <h1>اسحاق</h1>
    <p>💻 مطور مواقع مبتدئ</p>

    <!-- Discord -->
    <a class="btn discord" href="https://discord.com/users/is7_9" target="_blank">
        ➕ Add me on Discord
    </a>

    <!-- Instagram -->
    <a class="btn instagram" href="https://instagram.com/dz16d" target="_blank">
        📸 Follow me on Instagram
    </a>

</div>

</body>
</html>
