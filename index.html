<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اسحاق | Portfolio</title>

<style>
/* خلفية احترافية */
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    overflow-x: hidden;
}

/* حركة دخول الصفحة */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* الكارد الرئيسي */
.card {
    width: 360px;
    margin: 80px auto;
    padding: 30px;
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);

    animation: fadeIn 1s ease-out;
}

/* صورة بروفايل */
.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 3px solid #38bdf8;
    margin-bottom: 15px;

    animation: fadeIn 1.3s ease-out;
}

/* اسم */
h1 {
    margin: 10px 0;
    color: #38bdf8;

    animation: fadeIn 1.5s ease-out;
}

/* نص */
p {
    color: #cbd5e1;
    font-size: 14px;

    animation: fadeIn 1.7s ease-out;
}

/* أزرار */
.btn {
    display: block;
    margin-top: 12px;
    padding: 12px;
    border-radius: 12px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;

    animation: fadeIn 2s ease-out;
}

.discord {
    background: #5865F2;
}

.instagram {
    background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
}

.btn:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

/* قسم المهارات */
.skills {
    margin-top: 25px;
    text-align: left;
    animation: fadeIn 2.3s ease-out;
}

.skill {
    margin: 8px 0;
    background: #1e293b;
    padding: 8px;
    border-radius: 8px;
}

/* footer */
footer {
    margin-top: 20px;
    font-size: 12px;
    color: #94a3b8;
    animation: fadeIn 2.5s ease-out;
}
</style>
</head>

<body>

<div class="card">

    <!-- صورة Discord -->
    <img class="profile"
    src="https://cdn.discordapp.com/avatars/1200879352875864134/f8dcf7c4b6cef83644eb44beed2fabf3.webp?size=256">

    <h1>اسحاق</h1>
    <p>💻 مطور مواقع | أتعلم البرمجة</p>

    <!-- أزرار -->
    <a class="btn discord" href="https://discord.com/users/is7_9" target="_blank">
        ➕ Add me on Discord
    </a>

    <a class="btn instagram" href="https://instagram.com/dz16d" target="_blank">
        📸 Follow me on Instagram
    </a>

    <!-- مهارات -->
    <div class="skills">
        <div class="skill">🔥 HTML & CSS</div>
        <div class="skill">⚡ JavaScript (قريبًا)</div>
        <div class="skill">🌐 GitHub Pages</div>
    </div>

    <footer>
        © 2026 - Is7_9 Portfolio
    </footer>

</div>

</body>
</html>
